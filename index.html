<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game dimensions - match window size
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      bird.y = canvas.height / 2;
      draw();
    });

    // Load assets
    const bgImg = new Image();
    bgImg.src = 'background.jpg';

    const birdImg = new Image();
    birdImg.src = 'bird.jpg';

    const obstacleImg = new Image();
    obstacleImg.src = 'obstacle.jpeg';

    // Bird properties
    const bird = {
      x: 150,
      y: canvas.height / 2,
      width: 45,
      height: 35,
      velocity: 0,
      gravity: 0.3,
      flapStrength: -8
    };

    // Pipe properties
    const pipes = [];
    const pipeWidth = 70;
    const pipeGapMin = 200;
    const pipeGapMax = 300;
    const pipeSpeed = 2;
    const pipeMinDistance = 300; // minimum horizontal gap between pipes
    const maxGapShift = 250; // max vertical shift of gap between consecutive pipes
    let lastPipeTopHeight = null;

    // Track loaded assets
    let assetsLoaded = 0;
    const totalAssets = 3;

    function onAssetLoad() {
      assetsLoaded++;
      if (assetsLoaded >= totalAssets) {
        gameLoop();
      }
    }

    bgImg.onload = onAssetLoad;
    birdImg.onload = onAssetLoad;
    obstacleImg.onload = onAssetLoad;

    // Input
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        bird.velocity = bird.flapStrength;
      }
    });

    function spawnPipe() {
      const gap = Math.random() * (pipeGapMax - pipeGapMin) + pipeGapMin;
      const minTop = 80;
      const maxTop = canvas.height - gap - 80;

      let topHeight;
      if (lastPipeTopHeight === null) {
        topHeight = Math.random() * (maxTop - minTop) + minTop;
      } else {
        // Clamp so gap doesn't shift too far from previous pipe
        const lo = Math.max(minTop, lastPipeTopHeight - maxGapShift);
        const hi = Math.min(maxTop, lastPipeTopHeight + maxGapShift);
        topHeight = Math.random() * (hi - lo) + lo;
      }

      lastPipeTopHeight = topHeight;

      pipes.push({
        x: canvas.width,
        topHeight: topHeight,
        bottomY: topHeight + gap
      });
    }

    function update(timestamp) {
      // Spawn pipe if no pipes yet or last pipe is far enough away
      const lastPipe = pipes[pipes.length - 1];
      if (!lastPipe || lastPipe.x < canvas.width - pipeMinDistance) {
        spawnPipe();
      }

      // Move pipes left
      for (let i = pipes.length - 1; i >= 0; i--) {
        pipes[i].x -= pipeSpeed;
        // Remove pipes that have gone off screen
        if (pipes[i].x + pipeWidth < 0) {
          pipes.splice(i, 1);
        }
      }

      // Apply gravity
      bird.velocity += bird.gravity;
      bird.y += bird.velocity;

      // Keep bird within screen bounds
      if (bird.y < 0) {
        bird.y = 0;
        bird.velocity = 0;
      }
      if (bird.y + bird.height > canvas.height) {
        bird.y = canvas.height - bird.height;
        bird.velocity = 0;
      }
    }

    function draw() {
      // Draw background scaled to canvas
      ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

      // Draw pipes
      for (const pipe of pipes) {
        // Top pipe (flipped vertically)
        ctx.save();
        ctx.translate(pipe.x + pipeWidth / 2, pipe.topHeight / 2);
        ctx.scale(1, -1);
        ctx.drawImage(obstacleImg, -pipeWidth / 2, -pipe.topHeight / 2, pipeWidth, pipe.topHeight);
        ctx.restore();

        // Bottom pipe
        const bottomHeight = canvas.height - pipe.bottomY;
        ctx.drawImage(obstacleImg, pipe.x, pipe.bottomY, pipeWidth, bottomHeight);
      }

      // Draw bird with rotation based on velocity
      ctx.save();
      ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
      const rotation = Math.max(-0.5, Math.min(bird.velocity * 0.05, 0.5));
      ctx.rotate(rotation);
      ctx.drawImage(birdImg, -bird.width / 2, -bird.height / 2, bird.width, bird.height);
      ctx.restore();
    }

    function gameLoop(timestamp) {
      update(timestamp);
      draw();
      requestAnimationFrame(gameLoop);
    }
  </script>
</body>
</html>
