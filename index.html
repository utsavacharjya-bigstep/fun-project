<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game dimensions - match window size
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      bird.targetX = canvas.width * 0.35;
      bird.y = canvas.height / 2;
      draw();
    });

    // Load assets
    const bgImg = new Image();
    bgImg.src = 'background.png';

    const birdImg = new Image();
    birdImg.src = 'bird.jpg';

    const obstacleImg = new Image();
    obstacleImg.src = 'obstacle.jpeg';

    // Audio
    const bgMusic = new Audio('bgmusic.mp3');
    bgMusic.loop = true;
    bgMusic.volume = 0.4;

    const hitSound = new Audio('hit.mp3');
    hitSound.volume = 0.7;

    // Bird properties
    const bird = {
      x: 100,
      targetX: canvas.width * 0.35,
      y: canvas.height / 2,
      width: 100,
      height: 90,
      velocity: 0,
      hVelocity: 0,
      hFriction: 0.95,
      gravity: 0.3,
      flapStrength: -8,
      hFlapStrength: 4.5
    };

    // Background scroll
    let bgScrollX = 0;

    // Pipe properties
    const pipes = [];
    const pipeWidth = 140;
    const pipeGapMin = 300;
    const pipeGapMax = 420;
    const pipeSpeed = 2;
    const pipeMinDistance = 500; // minimum horizontal gap between pipes
    const maxGapShift = 250; // max vertical shift of gap between consecutive pipes
    let lastPipeTopHeight = null;

    // Game state: 'idle', 'playing', 'gameover'
    let gameState = 'idle';
    let score = 0;

    // Track loaded assets
    let assetsLoaded = 0;
    const totalAssets = 3;

    function onAssetLoad() {
      assetsLoaded++;
      if (assetsLoaded >= totalAssets) {
        gameLoop();
      }
    }

    bgImg.onload = onAssetLoad;
    birdImg.onload = onAssetLoad;
    obstacleImg.onload = onAssetLoad;

    function resetGame() {
      bird.x = 100;
      bird.y = canvas.height / 2;
      bird.velocity = 0;
      bird.hVelocity = 0;
      pipes.length = 0;
      lastPipeTopHeight = null;
      score = 0;
      bgScrollX = 0;
    }

    // Input
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (gameState === 'idle') {
          gameState = 'playing';
          bird.velocity = bird.flapStrength;
          bird.hVelocity = bird.hFlapStrength;
          bgMusic.currentTime = 0;
          bgMusic.play();
        } else if (gameState === 'playing') {
          bird.velocity = bird.flapStrength;
          // Boost horizontal velocity during glide phase
          if (bird.x < bird.targetX) {
            bird.hVelocity = bird.hFlapStrength;
          }
        }
      }
      if (e.code === 'Enter') {
        if (gameState === 'gameover') {
          resetGame();
          gameState = 'idle';
        }
      }
    });

    function spawnPipe() {
      const gap = Math.random() * (pipeGapMax - pipeGapMin) + pipeGapMin;
      const minTop = 80;
      const maxTop = canvas.height - gap - 80;

      let topHeight;
      if (lastPipeTopHeight === null) {
        topHeight = Math.random() * (maxTop - minTop) + minTop;
      } else {
        // Clamp so gap doesn't shift too far from previous pipe
        const lo = Math.max(minTop, lastPipeTopHeight - maxGapShift);
        const hi = Math.min(maxTop, lastPipeTopHeight + maxGapShift);
        topHeight = Math.random() * (hi - lo) + lo;
      }

      lastPipeTopHeight = topHeight;

      pipes.push({
        x: canvas.width,
        topHeight: topHeight,
        bottomY: topHeight + gap
      });
    }

    function checkCollision() {
      // Hit floor or ceiling
      if (bird.y <= 0 || bird.y + bird.height >= canvas.height) {
        return true;
      }

      // Hit a pipe
      for (const pipe of pipes) {
        const birdRight = bird.x + bird.width;
        const birdBottom = bird.y + bird.height;
        const pipeRight = pipe.x + pipeWidth;

        // Check horizontal overlap
        if (birdRight > pipe.x && bird.x < pipeRight) {
          // Check if bird is inside the gap
          if (bird.y < pipe.topHeight || birdBottom > pipe.bottomY) {
            return true;
          }
        }
      }
      return false;
    }

    function update(timestamp) {
      if (gameState !== 'playing') return;

      const gliding = bird.x < bird.targetX;

      // Apply horizontal velocity during glide
      if (gliding) {
        bird.x += bird.hVelocity;
        bird.hVelocity *= bird.hFriction;
      }

      // Cap bird at target position
      if (bird.x >= bird.targetX) {
        bird.x = bird.targetX;
        bird.hVelocity = 0;
      }

      // Scroll background only after glide phase
      if (!gliding) {
        bgScrollX = (bgScrollX + pipeSpeed) % canvas.width;
      }

      // Apply gravity always
      bird.velocity += bird.gravity;
      bird.y += bird.velocity;

      // Clamp bird position
      if (bird.y < 0) {
        bird.y = 0;
        bird.velocity = 0;
      }
      if (bird.y + bird.height > canvas.height) {
        bird.y = canvas.height - bird.height;
        bird.velocity = 0;
      }

      // Check collisions (floor/ceiling during glide, pipes + floor/ceiling after)
      if (checkCollision()) {
        gameState = 'gameover';
        bgMusic.pause();
        hitSound.currentTime = 0;
        hitSound.play();
        return;
      }

      // Don't spawn or move pipes during glide phase
      if (gliding) return;

      // Spawn pipe if no pipes yet or last pipe is far enough away
      const lastPipe = pipes[pipes.length - 1];
      if (!lastPipe || lastPipe.x < canvas.width - pipeMinDistance) {
        spawnPipe();
      }

      // Move pipes left and track score
      for (let i = pipes.length - 1; i >= 0; i--) {
        pipes[i].x -= pipeSpeed;

        // Score when bird passes a pipe
        if (!pipes[i].scored && pipes[i].x + pipeWidth < bird.x) {
          pipes[i].scored = true;
          score++;
        }

        // Remove pipes that have gone off screen
        if (pipes[i].x + pipeWidth < 0) {
          pipes.splice(i, 1);
        }
      }

    }

    function draw() {
      // Draw scrolling background (two copies side by side for seamless loop)
      ctx.drawImage(bgImg, -bgScrollX, 0, canvas.width, canvas.height);
      ctx.drawImage(bgImg, canvas.width - bgScrollX, 0, canvas.width, canvas.height);

      // Draw pipes
      for (const pipe of pipes) {
        // Top pipe (flipped vertically)
        ctx.save();
        ctx.translate(pipe.x + pipeWidth / 2, pipe.topHeight / 2);
        ctx.scale(1, -1);
        ctx.drawImage(obstacleImg, -pipeWidth / 2, -pipe.topHeight / 2, pipeWidth, pipe.topHeight);
        ctx.restore();

        // Bottom pipe
        const bottomHeight = canvas.height - pipe.bottomY;
        ctx.drawImage(obstacleImg, pipe.x, pipe.bottomY, pipeWidth, bottomHeight);
      }

      // Draw bird with rotation based on velocity
      ctx.save();
      ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
      const rotation = Math.max(-0.5, Math.min(bird.velocity * 0.05, 0.5));
      ctx.rotate(rotation);
      ctx.drawImage(birdImg, -bird.width / 2, -bird.height / 2, bird.width, bird.height);
      ctx.restore();

      // Draw score
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 4;
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.strokeText(score, canvas.width / 2, 60);
      ctx.fillText(score, canvas.width / 2, 60);

      // Draw state messages
      if (gameState === 'idle') {
        ctx.font = 'bold 36px Arial';
        ctx.strokeText('Press SPACE to Start', canvas.width / 2, canvas.height / 2 + 60);
        ctx.fillText('Press SPACE to Start', canvas.width / 2, canvas.height / 2 + 60);
      } else if (gameState === 'gameover') {
        ctx.font = 'bold 52px Arial';
        ctx.fillStyle = '#ff4444';
        ctx.strokeText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 30px Arial';
        ctx.strokeText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 30);
        ctx.fillText('Score: ' + score, canvas.width / 2, canvas.height / 2 + 30);
        ctx.font = 'bold 24px Arial';
        ctx.strokeText('Press ENTER to go back', canvas.width / 2, canvas.height / 2 + 75);
        ctx.fillText('Press ENTER to go back', canvas.width / 2, canvas.height / 2 + 75);
      }
    }

    function gameLoop(timestamp) {
      update(timestamp);
      draw();
      requestAnimationFrame(gameLoop);
    }
  </script>
</body>
</html>
