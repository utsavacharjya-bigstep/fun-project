<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game dimensions - match window size
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      bird.y = canvas.height / 2;
      draw();
    });

    // Load assets
    const bgImg = new Image();
    bgImg.src = 'background.jpg';

    const birdImg = new Image();
    birdImg.src = 'bird.jpg';

    // Bird properties
    const bird = {
      x: 150,
      y: canvas.height / 2,
      width: 45,
      height: 35,
      velocity: 0,
      gravity: 0.5,
      flapStrength: -16
    };

    // Track loaded assets
    let assetsLoaded = 0;
    const totalAssets = 2;

    function onAssetLoad() {
      assetsLoaded++;
      if (assetsLoaded >= totalAssets) {
        gameLoop();
      }
    }

    bgImg.onload = onAssetLoad;
    birdImg.onload = onAssetLoad;

    // Input
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        bird.velocity = bird.flapStrength;
      }
    });

    function update() {
      // Apply gravity
      bird.velocity += bird.gravity;
      bird.y += bird.velocity;

      // Keep bird within screen bounds
      if (bird.y < 0) {
        bird.y = 0;
        bird.velocity = 0;
      }
      if (bird.y + bird.height > canvas.height) {
        bird.y = canvas.height - bird.height;
        bird.velocity = 0;
      }
    }

    function draw() {
      // Draw background scaled to canvas
      ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

      // Draw bird with rotation based on velocity
      ctx.save();
      ctx.translate(bird.x + bird.width / 2, bird.y + bird.height / 2);
      const rotation = Math.max(-0.5, Math.min(bird.velocity * 0.05, 0.5));
      ctx.rotate(rotation);
      ctx.drawImage(birdImg, -bird.width / 2, -bird.height / 2, bird.width, bird.height);
      ctx.restore();
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }
  </script>
</body>
</html>
